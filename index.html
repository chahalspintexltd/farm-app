<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Farm Records">
<title>Farm Records</title>
<style>
  :root {
    --green: #2d6a2d; --green-light: #e8f5e8; --green-mid: #4a9e4a;
    --amber: #b45309; --amber-bg: #fef3c7; --amber-border: #fcd34d;
    --blue: #1d4ed8; --blue-bg: #eff6ff; --blue-border: #93c5fd;
    --purple: #6d28d9; --purple-bg: #f5f3ff; --purple-border: #c4b5fd;
    --red: #b91c1c; --red-bg: #fef2f2;
    --text: #1a1a1a; --text2: #555; --text3: #888;
    --border: #e0e0e0; --bg: #f4f6f4; --card: #ffffff; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; padding-bottom: 72px; }

  /* Top bar */
  .topbar { background: var(--green); color: #fff; padding: 14px 16px 12px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
  .topbar-icon { font-size: 22px; }
  .topbar-title { font-size: 17px; font-weight: 600; flex: 1; }
  .topbar-sub { font-size: 12px; opacity: .75; }

  /* Bottom nav */
  .bottomnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px 14px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; gap: 4px; font-family: inherit; }
  .nav-item .nav-icon { font-size: 22px; }
  .nav-item.active { color: var(--green); }
  .nav-item.active .nav-icon { transform: scale(1.1); }

  /* Content */
  .content { padding: 14px 14px 0; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* Cards */
  .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
  .card-body { padding: 14px; }
  .card-tap { cursor: pointer; }
  .card-tap:active { background: #f9f9f9; }
  .card-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-title { font-size: 15px; font-weight: 600; }
  .card-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .chevron { color: var(--text3); font-size: 18px; margin-top: 2px; }

  /* Crop stat grid — 3 coloured boxes per crop card */
  .crop-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
  .cstat { border-radius: 8px; padding: 8px 6px; text-align: center; }
  .cstat-val { font-size: 18px; font-weight: 700; }
  .cstat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; margin-top: 2px; }
  .cstat.sow { background: var(--blue-bg); border: 1px solid var(--blue-border); }
  .cstat.sow .cstat-val { color: var(--blue); }
  .cstat.sow .cstat-label { color: #3b82f6; }
  .cstat.fert { background: var(--green-light); border: 1px solid #86efac; }
  .cstat.fert .cstat-val { color: var(--green); }
  .cstat.fert .cstat-label { color: #15803d; }
  .cstat.spray { background: var(--amber-bg); border: 1px solid var(--amber-border); }
  .cstat.spray .cstat-val { color: var(--amber); }
  .cstat.spray .cstat-label { color: #92400e; }

  /* Form */
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; background: #fff; color: var(--text); font-family: inherit; appearance: none; -webkit-appearance: none; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(45,106,45,.12); }
  .field textarea { resize: none; height: 72px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: opacity .15s, transform .1s; }
  .btn:active { transform: scale(.97); opacity: .9; }
  .btn-full { width: 100%; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-danger { background: none; border: 1px solid #fca5a5; color: var(--red); }
  .btn-link { background: none; border: none; color: var(--green); font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; font-family: inherit; text-decoration: underline; }

  /* Tags */
  .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin: 2px; }
  .tag-sow { background: var(--blue-bg); color: var(--blue); }
  .tag-fert { background: var(--green-light); color: var(--green); }
  .tag-spray { background: var(--amber-bg); color: var(--amber); }

  /* Subtabs (entry form) */
  .subtabs { display: flex; background: #eee; border-radius: 10px; padding: 3px; margin-bottom: 16px; }
  .stab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 600; border: none; background: none; cursor: pointer; border-radius: 8px; color: var(--text2); font-family: inherit; }
  .stab.active { background: #fff; color: var(--green); box-shadow: 0 1px 4px rgba(0,0,0,.12); }

  /* Detail tabs (crop view) */
  .dtabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 14px; }
  .dtab { flex: 1; padding: 10px 6px; text-align: center; font-size: 13px; font-weight: 600; border: none; background: none; cursor: pointer; font-family: inherit; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .dtab.active { color: var(--green); border-bottom-color: var(--green); }
  .dtab-panel { display: none; }
  .dtab-panel.active { display: block; }

  /* Metrics bar at top of crop detail */
  .metrics3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
  .metric { border-radius: 10px; padding: 12px 8px; text-align: center; }
  .metric-val { font-size: 24px; font-weight: 700; }
  .metric-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; }
  .metric.sow { background: var(--blue-bg); border: 1px solid var(--blue-border); }
  .metric.sow .metric-val { color: var(--blue); }
  .metric.sow .metric-label { color: #3b82f6; }
  .metric.fert { background: var(--green-light); border: 1px solid #86efac; }
  .metric.fert .metric-val { color: var(--green); }
  .metric.fert .metric-label { color: #15803d; }
  .metric.spray { background: var(--amber-bg); border: 1px solid var(--amber-border); }
  .metric.spray .metric-val { color: var(--amber); }
  .metric.spray .metric-label { color: #92400e; }

  /* Timeline */
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .tl-item { position: relative; margin-bottom: 12px; }
  .tl-dot { position: absolute; left: -22px; top: 4px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid; }
  .tl-dot.sow { background: var(--blue-bg); border-color: var(--blue); }
  .tl-dot.fert { background: var(--green-light); border-color: var(--green); }
  .tl-dot.spray { background: var(--amber-bg); border-color: var(--amber); }
  .tl-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .tl-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .tl-date { font-size: 11px; color: var(--text3); }
  .tl-main { font-size: 14px; font-weight: 600; }
  .tl-detail { font-size: 12px; color: var(--text2); margin-top: 3px; }

  /* Simple record list (for fert/spray tabs) */
  .rec-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; margin-bottom: 8px; }
  .rec-item-top { display: flex; justify-content: space-between; align-items: center; }
  .rec-item-name { font-size: 14px; font-weight: 600; }
  .rec-item-date { font-size: 11px; color: var(--text3); }
  .rec-item-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .rec-count-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; margin-bottom: 10px; }
  .badge-fert { background: var(--green-light); color: var(--green); border: 1px solid #86efac; }
  .badge-spray { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .badge-sow { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

  /* Section header */
  .section-hd { font-size: 13px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin: 16px 0 8px; }

  /* Empty */
  .empty { text-align: center; padding: 36px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; display: block; margin-bottom: 10px; }
  .empty p { font-size: 14px; }

  /* Toast */
  .toast { position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; z-index: 200; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Setup list */
  .list-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 1px solid var(--border); }
  .list-item:last-child { border-bottom: none; }
  .list-name { font-size: 14px; font-weight: 500; }
  .list-sub { font-size: 12px; color: var(--text3); }

  /* Connection box */
  .conn-box { border-radius: var(--radius); padding: 14px; margin-bottom: 14px; border: 1px solid; }
  .conn-box.disconnected { background: #fff8e1; border-color: #fcd34d; }
  .conn-box.connected { background: var(--green-light); border-color: #a7d9a7; }
  .conn-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .conn-box.disconnected .conn-title { color: #92400e; }
  .conn-box.connected .conn-title { color: var(--green); }
  .conn-sub { font-size: 12px; }
  .conn-box.disconnected .conn-sub { color: #78350f; }
  .conn-box.connected .conn-sub { color: #166534; }
  .url-mono { font-size: 11px; background: rgba(0,0,0,.05); border-radius: 5px; padding: 6px 8px; word-break: break-all; font-family: monospace; margin-top: 8px; color: var(--text2); }

  /* Spinner */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; gap: 12px; }
  .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
  .loading-text { font-size: 14px; color: var(--text2); }

  @media (prefers-color-scheme: dark) {
    :root { --bg: #111; --card: #1e1e1e; --border: #333; --text: #f0f0f0; --text2: #aaa; --text3: #666; }
    .field input, .field select, .field textarea { background: #2a2a2a; color: #f0f0f0; border-color: #444; }
    .subtabs { background: #2a2a2a; }
    .stab.active { background: #1e1e1e; }
    .bottomnav { background: #1e1e1e; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar" id="topbar">
    <span class="topbar-icon">🌾</span>
    <div style="flex:1">
      <div class="topbar-title" id="topbar-title">Farm Records</div>
      <div class="topbar-sub" id="topbar-sub">Select a farm to begin</div>
    </div>
  </div>

  <div class="loading-overlay" id="loading-overlay" style="display:none">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">Loading…</div>
  </div>
  <div class="toast" id="toast"></div>

  <div class="content">

    <!-- ① Farm list -->
    <div class="screen active" id="screen-farms">
      <div class="section-hd">Your farms</div>
      <div id="farm-list-dash"></div>
    </div>

    <!-- ② Season picker -->
    <div class="screen" id="screen-seasons">
      <div class="section-hd">Select season</div>
      <div id="season-list"></div>
      <button class="btn btn-outline btn-full" onclick="showNewSeason()" style="margin-top:4px">+ Start new season</button>
    </div>

    <!-- ③ Crop list -->
    <div class="screen" id="screen-crops">
      <div id="crop-list-dash"></div>
    </div>

    <!-- ④ Crop detail with tabs -->
    <div class="screen" id="screen-detail">
      <div id="crop-detail-content"></div>
    </div>

    <!-- ⑤ Add record -->
    <div class="screen" id="screen-entry">
      <div class="subtabs">
        <button class="stab active" onclick="setType('sowing')">🌱 Sowing</button>
        <button class="stab" onclick="setType('fertiliser')">🧪 Fertiliser</button>
        <button class="stab" onclick="setType('spray')">💧 Spray</button>
      </div>
      <div class="card"><div class="card-body">
        <div class="row2">
          <div class="field">
            <label>Farm</label>
            <select id="ef-farm" onchange="loadEntrySeasonCrop()"><option value="">Select</option></select>
          </div>
          <div class="field">
            <label>Season</label>
            <input type="number" id="ef-season" placeholder="2024" min="2000" max="2099">
          </div>
        </div>
        <div class="field">
          <label>Crop</label>
          <select id="ef-crop"><option value="">Select crop</option></select>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="ef-date">
        </div>

        <div id="f-sowing">
          <div class="row2">
            <div class="field"><label>Seed variety</label><input type="text" id="sow-variety" placeholder="PBW-343…"></div>
            <div class="field"><label>Qty (kg/acre)</label><input type="number" id="sow-qty" placeholder="40"></div>
          </div>
          <div class="field"><label>Method / notes</label><textarea id="sow-notes" placeholder="Drill method, row spacing…"></textarea></div>
        </div>

        <div id="f-fertiliser" style="display:none">
          <div class="row2">
            <div class="field"><label>Product name</label><input type="text" id="fert-name" placeholder="DAP, Urea, NPK…"></div>
            <div class="field">
              <label>Application type</label>
              <select id="fert-type">
                <option>Basal / pre-sowing</option><option>Top dressing</option>
                <option>Foliar</option><option>Drip / fertigation</option>
                <option>Organic</option><option>Other</option>
              </select>
            </div>
          </div>
          <div class="row2">
            <div class="field"><label>Quantity</label><input type="text" id="fert-qty" placeholder="50 kg/acre"></div>
            <div class="field">
              <label>Method</label>
              <select id="fert-method">
                <option>Broadcast</option><option>Band / furrow</option>
                <option>Foliar spray</option><option>Drip</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Notes</label><textarea id="fert-notes" placeholder="Soil condition, weather…"></textarea></div>
        </div>

        <div id="f-spray" style="display:none">
          <div class="row2">
            <div class="field"><label>Product name</label><input type="text" id="spray-name" placeholder="Monocrotophos…"></div>
            <div class="field">
              <label>Type</label>
              <select id="spray-type">
                <option>Insecticide</option><option>Fungicide</option>
                <option>Herbicide</option><option>Weedicide</option>
                <option>Growth regulator</option><option>Micronutrient</option><option>Other</option>
              </select>
            </div>
          </div>
          <div class="row2">
            <div class="field"><label>Dose</label><input type="text" id="spray-dose" placeholder="2 ml/L"></div>
            <div class="field"><label>Target pest / disease</label><input type="text" id="spray-target" placeholder="Aphids, blight…"></div>
          </div>
          <div class="field"><label>Notes</label><textarea id="spray-notes" placeholder="Crop stage, weather…"></textarea></div>
        </div>

        <button class="btn btn-green btn-full" id="save-btn" onclick="saveRecord()">Save record</button>
      </div></div>
    </div>

    <!-- ⑥ Setup -->
    <div class="screen" id="screen-setup">

      <!-- Connection card — changes appearance once connected -->
      <div class="section-hd">Google Sheets connection</div>
      <div class="card"><div class="card-body" id="conn-card-body">
        <!-- rendered by updateConnStatus() -->
      </div></div>

      <!-- Farms -->
      <div class="section-hd">Farms</div>
      <div class="card"><div class="card-body">
        <div class="row2">
          <div class="field"><label>Farm name</label><input type="text" id="new-farm-name" placeholder="Khet No.1"></div>
          <div class="field"><label>Area (acres)</label><input type="number" id="new-farm-area" placeholder="5"></div>
        </div>
        <button class="btn btn-green btn-full" onclick="addFarm()">Add farm</button>
      </div></div>
      <div class="card" id="farm-setup-list" style="display:none"></div>

      <!-- Crops -->
      <div class="section-hd">Crops</div>
      <div class="card"><div class="card-body">
        <div class="row2">
          <div class="field"><label>Crop name</label><input type="text" id="new-crop-name" placeholder="Wheat"></div>
          <div class="field">
            <label>Category</label>
            <select id="new-crop-cat">
              <option>Cereal / Grain</option><option>Vegetable</option><option>Fruit</option>
              <option>Oilseed</option><option>Pulse / Legume</option><option>Fibre</option><option>Other</option>
            </select>
          </div>
        </div>
        <button class="btn btn-green btn-full" onclick="addCrop()">Add crop</button>
      </div></div>
      <div class="card" id="crop-setup-list" style="display:none"></div>

    </div>
  </div><!-- /content -->

  <nav class="bottomnav">
    <button class="nav-item active" id="nav-dash" onclick="goNav('dash')">
      <span class="nav-icon">🏠</span>Dashboard
    </button>
    <button class="nav-item" id="nav-entry" onclick="goNav('entry')">
      <span class="nav-icon">➕</span>Add record
    </button>
    <button class="nav-item" id="nav-setup" onclick="goNav('setup')">
      <span class="nav-icon">⚙️</span>Setup
    </button>
  </nav>
</div>

<script>
// ── State ──
let BASE_URL = localStorage.getItem('scriptUrl') || '';
let farms = [], crops = [], records = [];
let activeFarmId = null, activeSeason = null, activeCropId = null;
let entryType = 'sowing';

// ── API ──
async function api(params) {
  if (!BASE_URL) { toast('⚠️ Not connected — go to Setup first'); return null; }
  const url = BASE_URL + '?' + new URLSearchParams(params).toString();
  try {
    const res = await fetch(url);
    const json = await res.json();
    if (json.error) { toast('Error: ' + json.error); return null; }
    return json;
  } catch(e) { toast('Connection error. Check your internet.'); return null; }
}

function loading(show, text='Loading…') {
  document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
  document.getElementById('loading-text').textContent = text;
}
function toast(msg, dur=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── Navigation ──
const SCREENS = ['screen-farms','screen-seasons','screen-crops','screen-detail','screen-entry','screen-setup'];
function showScreen(id) {
  SCREENS.forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setTopbar(title, sub) {
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-sub').textContent = sub;
}
function goNav(tab) {
  ['dash','entry','setup'].forEach(t => document.getElementById('nav-'+t).classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  if (tab==='dash')  { renderFarms(); setTopbar('Farm Records','Select a farm'); }
  if (tab==='entry') { showScreen('screen-entry'); setTopbar('Add record',''); populateEntryFarms(); }
  if (tab==='setup') { showScreen('screen-setup'); setTopbar('Setup','Farms & crops'); renderSetup(); }
}

// ── Dashboard ──
async function renderFarms() {
  showScreen('screen-farms');
  if (!BASE_URL) {
    document.getElementById('farm-list-dash').innerHTML = '<div class="empty"><span class="empty-icon">🔗</span><p>Go to Setup to connect Google Sheets first.</p></div>';
    return;
  }
  loading(true, 'Loading farms…');
  const f = await api({action:'getFarms'});
  const c = await api({action:'getCrops'});
  loading(false);
  if (!f) return;
  farms = f.farms || [];
  crops = (c && c.crops) || [];
  if (!farms.length) {
    document.getElementById('farm-list-dash').innerHTML = '<div class="empty"><span class="empty-icon">🌾</span><p>No farms yet. Go to Setup to add your farms.</p></div>';
    return;
  }
  document.getElementById('farm-list-dash').innerHTML = farms.map(fm =>
    `<div class="card card-tap" onclick="openFarm('${fm.id}','${esc(fm.name)}','${fm.area||''}')">
      <div class="card-body card-row">
        <div><div class="card-title">🏡 ${esc(fm.name)}</div>
        <div class="card-sub">${fm.area ? fm.area+' acres' : 'Area not set'}</div></div>
        <span class="chevron">›</span>
      </div>
    </div>`).join('');
}

async function openFarm(id, name, area) {
  activeFarmId = id;
  setTopbar(name, area ? area+' acres' : 'Farm');
  showScreen('screen-seasons');
  loading(true, 'Loading seasons…');
  const res = await api({action:'getRecords', farm: id});
  loading(false);
  records = (res && res.records) || [];
  const seasons = [...new Set(records.map(r => r.season))].sort().reverse();
  const sl = document.getElementById('season-list');
  if (!seasons.length) {
    sl.innerHTML = '<div class="empty"><span class="empty-icon">📅</span><p>No seasons yet. Add a record to get started.</p></div>';
    return;
  }
  sl.innerHTML = seasons.map(s => {
    const sRecs = records.filter(r => r.season == s);
    const cropCount = new Set(sRecs.map(r => r.crop)).size;
    const nFert = sRecs.filter(r=>r.type==='fertiliser').length;
    const nSpray = sRecs.filter(r=>r.type==='spray').length;
    return `<div class="card card-tap" onclick="openSeason('${s}')">
      <div class="card-body">
        <div class="card-row">
          <div><div class="card-title">📅 Season ${s}</div>
          <div class="card-sub">${cropCount} crop${cropCount!==1?'s':''}</div></div>
          <span class="chevron">›</span>
        </div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--green-light);color:var(--green);border:1px solid #86efac">🧪 ${nFert} fert</span>
          <span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)">💧 ${nSpray} spray</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function showNewSeason() {
  goNav('entry');
  setTimeout(() => { document.getElementById('ef-farm').value = activeFarmId; document.getElementById('ef-season').focus(); }, 100);
}

async function openSeason(season) {
  activeSeason = season;
  const farmName = farms.find(f=>f.id===activeFarmId)?.name||'';
  setTopbar('Season '+season, farmName);
  showScreen('screen-crops');
  const sRecs = records.filter(r => r.season == season);
  const cropIds = [...new Set(sRecs.map(r => r.crop))];
  const cl = document.getElementById('crop-list-dash');
  if (!cropIds.length) { cl.innerHTML = '<div class="empty"><p>No crops this season.</p></div>'; return; }
  cl.innerHTML = '<div class="section-hd">Crops in '+season+'</div>' + cropIds.map(cid => {
    const crop = crops.find(c => c.id===cid) || {name:cid, category:''};
    const cRecs = sRecs.filter(r => r.crop===cid);
    const nSow  = cRecs.filter(r=>r.type==='sowing').length;
    const nFert = cRecs.filter(r=>r.type==='fertiliser').length;
    const nSpray= cRecs.filter(r=>r.type==='spray').length;
    return `<div class="card card-tap" onclick="openCrop('${cid}')">
      <div class="card-body">
        <div class="card-row" style="margin-bottom:4px">
          <div><div class="card-title">🌱 ${esc(crop.name)}</div>
          <div class="card-sub">${crop.category||''}</div></div>
          <span class="chevron">›</span>
        </div>
        <div class="crop-stats">
          <div class="cstat sow"><div class="cstat-val">${nSow}</div><div class="cstat-label">Sowings</div></div>
          <div class="cstat fert"><div class="cstat-val">${nFert}</div><div class="cstat-label">Fertiliser</div></div>
          <div class="cstat spray"><div class="cstat-val">${nSpray}</div><div class="cstat-label">Sprays</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openCrop(cid) {
  activeCropId = cid;
  const crop = crops.find(c=>c.id===cid)||{name:cid};
  const farm = farms.find(f=>f.id===activeFarmId)||{name:''};
  setTopbar(crop.name, farm.name+' · '+activeSeason);
  showScreen('screen-detail');

  const cRecs = records.filter(r=>r.season==activeSeason && r.crop===cid).sort((a,b)=>a.date<b.date?-1:1);
  const sowRecs   = cRecs.filter(r=>r.type==='sowing');
  const fertRecs  = cRecs.filter(r=>r.type==='fertiliser');
  const sprayRecs = cRecs.filter(r=>r.type==='spray');

  function tlItem(r) {
    const dc = r.type==='sowing'?'sow':r.type==='fertiliser'?'fert':'spray';
    let typeName='', main='', detail='';
    if (r.type==='sowing') { typeName='Sowing'; main=r.variety||'Sowing recorded'; detail=[r.qty?r.qty+' kg/acre':'',r.notes].filter(Boolean).join(' · '); }
    else if (r.type==='fertiliser') { typeName=r.fertType||'Fertiliser'; main=r.name; detail=[r.qty,r.method,r.notes].filter(Boolean).join(' · '); }
    else { typeName=r.sprayType||'Spray'; main=r.name; detail=[r.dose,r.target?'→ '+r.target:'',r.notes].filter(Boolean).join(' · '); }
    return `<div class="tl-item"><div class="tl-dot ${dc}"></div>
      <div class="tl-card">
        <div class="tl-top"><span class="tag tag-${dc}">${typeName}</span><span class="tl-date">${r.date}</span></div>
        <div class="tl-main">${esc(main)}</div>
        ${detail?`<div class="tl-detail">${esc(detail)}</div>`:''}
      </div></div>`;
  }

  function recListItem(r, type) {
    let name='', sub='';
    if (type==='fertiliser') { name=r.name; sub=[r.fertType, r.qty, r.method, r.notes].filter(Boolean).join(' · '); }
    else { name=r.name; sub=[r.sprayType, r.dose, r.target?'Target: '+r.target:'', r.notes].filter(Boolean).join(' · '); }
    return `<div class="rec-item">
      <div class="rec-item-top"><span class="rec-item-name">${esc(name)}</span><span class="rec-item-date">${r.date}</span></div>
      ${sub?`<div class="rec-item-sub">${esc(sub)}</div>`:''}
    </div>`;
  }

  const sowHtml = sowRecs.length
    ? `<span class="rec-count-badge badge-sow">🌱 ${sowRecs.length} sowing${sowRecs.length!==1?'s':''}</span>
       <div class="timeline">${sowRecs.map(r=>tlItem(r)).join('')}</div>`
    : '<div class="empty"><p>No sowings recorded.</p></div>';

  const fertHtml = fertRecs.length
    ? `<span class="rec-count-badge badge-fert">🧪 ${fertRecs.length} application${fertRecs.length!==1?'s':''}</span>`
      + fertRecs.map(r=>recListItem(r,'fertiliser')).join('')
    : '<div class="empty"><p>No fertiliser records.</p></div>';

  const sprayHtml = sprayRecs.length
    ? `<span class="rec-count-badge badge-spray">💧 ${sprayRecs.length} spray${sprayRecs.length!==1?'s':''}</span>`
      + sprayRecs.map(r=>recListItem(r,'spray')).join('')
    : '<div class="empty"><p>No spray records.</p></div>';

  const allHtml = cRecs.length
    ? `<div class="timeline">${cRecs.map(r=>tlItem(r)).join('')}</div>`
    : '<div class="empty"><p>No records yet.</p></div>';

  document.getElementById('crop-detail-content').innerHTML = `
    <div class="metrics3">
      <div class="metric sow"><div class="metric-val">${sowRecs.length}</div><div class="metric-label">Sowings</div></div>
      <div class="metric fert"><div class="metric-val">${fertRecs.length}</div><div class="metric-label">Fertiliser</div></div>
      <div class="metric spray"><div class="metric-val">${sprayRecs.length}</div><div class="metric-label">Sprays</div></div>
    </div>
    <div class="dtabs">
      <button class="dtab active" onclick="switchTab(this,'tab-all')">All</button>
      <button class="dtab" onclick="switchTab(this,'tab-sow')">🌱 Sowing</button>
      <button class="dtab" onclick="switchTab(this,'tab-fert')">🧪 Fertiliser</button>
      <button class="dtab" onclick="switchTab(this,'tab-spray')">💧 Spray</button>
    </div>
    <div class="dtab-panel active" id="tab-all">${allHtml}</div>
    <div class="dtab-panel" id="tab-sow">${sowHtml}</div>
    <div class="dtab-panel" id="tab-fert">${fertHtml}</div>
    <div class="dtab-panel" id="tab-spray">${sprayHtml}</div>
    <button class="btn btn-green btn-full" style="margin-top:16px" onclick="quickAddRecord()">+ Add record for this crop</button>
  `;
}

function switchTab(btn, panelId) {
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dtab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}

function quickAddRecord() {
  goNav('entry');
  setTimeout(() => {
    if(activeFarmId) document.getElementById('ef-farm').value = activeFarmId;
    if(activeSeason) document.getElementById('ef-season').value = activeSeason;
    if(activeCropId) document.getElementById('ef-crop').value = activeCropId;
  }, 80);
}

// ── Entry form ──
function setType(t) {
  entryType = t;
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('active',['sowing','fertiliser','spray'][i]===t));
  ['sowing','fertiliser','spray'].forEach(x=>document.getElementById('f-'+x).style.display=x===t?'block':'none');
}
function populateEntryFarms() {
  const s = document.getElementById('ef-farm');
  s.innerHTML = '<option value="">Select farm</option>' + farms.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join('');
  if (!document.getElementById('ef-date').value) document.getElementById('ef-date').value = todayStr();
  if (!document.getElementById('ef-season').value) document.getElementById('ef-season').value = new Date().getFullYear();
  loadEntrySeasonCrop();
}
function loadEntrySeasonCrop() {
  const s = document.getElementById('ef-crop');
  s.innerHTML = '<option value="">Select crop</option>' + crops.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
}
async function saveRecord() {
  const farm = document.getElementById('ef-farm').value;
  const season = document.getElementById('ef-season').value;
  const crop = document.getElementById('ef-crop').value;
  const date = document.getElementById('ef-date').value;
  if (!farm||!season||!crop||!date) { toast('⚠️ Fill in farm, season, crop, and date'); return; }
  const btn = document.getElementById('save-btn');
  btn.innerHTML = '<span class="spinner"></span> Saving…'; btn.disabled = true;
  const farmName = farms.find(f=>f.id===farm)?.name||'';
  const cropName = crops.find(c=>c.id===crop)?.name||'';
  const p = {action:'addRecord', farm, farmName, season, crop, cropName, date, type:entryType};
  if (entryType==='sowing') {
    p.variety=document.getElementById('sow-variety').value;
    p.qty=document.getElementById('sow-qty').value;
    p.notes=document.getElementById('sow-notes').value;
  } else if (entryType==='fertiliser') {
    p.name=document.getElementById('fert-name').value;
    if(!p.name){toast('⚠️ Enter fertiliser name');btn.innerHTML='Save record';btn.disabled=false;return;}
    p.fertType=document.getElementById('fert-type').value;
    p.qty=document.getElementById('fert-qty').value;
    p.method=document.getElementById('fert-method').value;
    p.notes=document.getElementById('fert-notes').value;
  } else {
    p.name=document.getElementById('spray-name').value;
    if(!p.name){toast('⚠️ Enter product name');btn.innerHTML='Save record';btn.disabled=false;return;}
    p.sprayType=document.getElementById('spray-type').value;
    p.dose=document.getElementById('spray-dose').value;
    p.target=document.getElementById('spray-target').value;
    p.notes=document.getElementById('spray-notes').value;
  }
  const res = await api(p);
  btn.innerHTML='Save record'; btn.disabled=false;
  if (res&&res.ok) { toast('✅ Saved to Google Sheets!'); clearEntryForm(); }
}
function clearEntryForm() {
  ['sow-variety','sow-qty','sow-notes','fert-name','fert-qty','fert-notes','spray-name','spray-dose','spray-target','spray-notes']
    .forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

// ── Setup & Connection ──
// The URL is saved in localStorage — auto-loads on every open.
// Once connected, the setup card shows status + a "Change URL" toggle.
let showingUrlInput = false;

function updateConnStatus() {
  const cb = document.getElementById('conn-card-body');
  if (!cb) return;
  if (BASE_URL) {
    cb.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:18px">✅</span>
        <span style="font-size:14px;font-weight:700;color:var(--green)">Connected to Google Sheets</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">Your records sync automatically. URL is saved — no need to paste again.</div>
      <div class="url-mono">${BASE_URL}</div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="toggleUrlInput()">Change URL</button>
        <button class="btn btn-danger btn-sm" onclick="disconnectSheet()">Disconnect</button>
      </div>
      <div id="change-url-area" style="display:none;margin-top:12px">
        <div class="field"><label>New Apps Script URL</label><input type="url" id="script-url" placeholder="https://script.google.com/macros/s/…/exec" value="${BASE_URL}"></div>
        <button class="btn btn-green btn-full" onclick="connectSheet()">Save new URL</button>
      </div>`;
  } else {
    cb.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:18px">🔗</span>
        <span style="font-size:14px;font-weight:700;color:#92400e">Not connected</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Paste your Google Apps Script URL once. It will be saved and loaded automatically every time you open this app.</div>
      <div class="field"><label>Apps Script web app URL</label><input type="url" id="script-url" placeholder="https://script.google.com/macros/s/…/exec"></div>
      <button class="btn btn-green btn-full" onclick="connectSheet()">Connect & save</button>`;
  }
}

function toggleUrlInput() {
  const area = document.getElementById('change-url-area');
  if (area) area.style.display = area.style.display==='none' ? 'block' : 'none';
}

async function connectSheet() {
  const input = document.getElementById('script-url');
  const url = input ? input.value.trim() : '';
  if (!url || !url.includes('script.google.com')) { toast('⚠️ Paste a valid Apps Script URL'); return; }
  loading(true, 'Testing connection…');
  BASE_URL = url;
  const res = await api({action:'ping'});
  loading(false);
  if (res && res.ok) {
    localStorage.setItem('scriptUrl', url);   // ← saved forever
    toast('✅ Connected! URL saved — you won\'t need to paste it again.');
    updateConnStatus();
    renderSetup();
  } else {
    BASE_URL = localStorage.getItem('scriptUrl') || '';
    toast('Could not connect. Check the URL and try again.');
  }
}

function disconnectSheet() {
  if (!confirm('Disconnect from Google Sheets? The URL will be removed.')) return;
  BASE_URL = '';
  localStorage.removeItem('scriptUrl');
  toast('Disconnected.');
  updateConnStatus();
}

async function renderSetup() {
  updateConnStatus();
  if (!BASE_URL) {
    document.getElementById('farm-setup-list').style.display='none';
    document.getElementById('crop-setup-list').style.display='none';
    return;
  }
  loading(true);
  const f = await api({action:'getFarms'});
  const c = await api({action:'getCrops'});
  loading(false);
  farms = (f&&f.farms)||[];
  crops = (c&&c.crops)||[];
  renderList('farm-setup-list', farms, item=>`<div class="list-item"><div><div class="list-name">${esc(item.name)}</div><div class="list-sub">${item.area?item.area+' acres':''}</div></div><button class="btn btn-danger btn-sm" onclick="deleteFarm('${item.id}')">Remove</button></div>`);
  renderList('crop-setup-list', crops, item=>`<div class="list-item"><div><div class="list-name">${esc(item.name)}</div><div class="list-sub">${item.category||''}</div></div><button class="btn btn-danger btn-sm" onclick="deleteCrop('${item.id}')">Remove</button></div>`);
}
function renderList(id, items, fn) {
  const el=document.getElementById(id);
  if(!items.length){el.style.display='none';return;}
  el.style.display='block'; el.innerHTML=items.map(fn).join('');
}
async function addFarm() {
  const name=document.getElementById('new-farm-name').value.trim();
  const area=document.getElementById('new-farm-area').value;
  if(!name){toast('⚠️ Enter a farm name');return;}
  loading(true,'Adding farm…');
  const res=await api({action:'addFarm',name,area});
  loading(false);
  if(res&&res.ok){document.getElementById('new-farm-name').value='';document.getElementById('new-farm-area').value='';toast('✅ Farm added!');renderSetup();}
}
async function addCrop() {
  const name=document.getElementById('new-crop-name').value.trim();
  const category=document.getElementById('new-crop-cat').value;
  if(!name){toast('⚠️ Enter a crop name');return;}
  loading(true,'Adding crop…');
  const res=await api({action:'addCrop',name,category});
  loading(false);
  if(res&&res.ok){document.getElementById('new-crop-name').value='';toast('✅ Crop added!');renderSetup();}
}
async function deleteFarm(id) {
  if(!confirm('Remove this farm?'))return;
  loading(true); await api({action:'deleteFarm',id}); loading(false); renderSetup();
}
async function deleteCrop(id) {
  if(!confirm('Remove this crop?'))return;
  loading(true); await api({action:'deleteCrop',id}); loading(false); renderSetup();
}

// ── Helpers ──
function todayStr(){return new Date().toISOString().split('T')[0];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Init — URL auto-loaded from localStorage ──
renderFarms();
setType('sowing');
</script>
</body>
</html>
